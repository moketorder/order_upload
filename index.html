        // Firebase?먯꽌 ?곹뭹 媛?몄삤湲?        async function fetchProducts() {
            try {
                const [res, stockRes] = await Promise.all([
                    fetch(`${FIREBASE_DB_URL}published_products.json?t=${Date.now()}`),
                    fetch(`${FIREBASE_DB_URL}global_stock.json?t=${Date.now()}`).catch(e => { console.error("Firebase ?ш퀬 濡쒕뱶 ?ㅽ뙣:", e); return { ok: false }; })
                ]);
                if (!res.ok) throw new Error("Firebase ?곌껐 ?ㅽ뙣");
                
                const data = await res.json();
                if (stockRes && stockRes.ok) {
                    globalAdjustments = await stockRes.json() || {};
                } else {
                    globalAdjustments = {};
                }
                
                if (data === null) {
                    products = [];
                } else if (Array.isArray(data)) {
                    products = data.filter(p => p !== null);
                } else if (typeof data === 'object') {
                    products = Object.values(data);

                buildSubTabs();

        // ???쒖텧 (???/ ?깅줉)
        async function submitForm(event) {
            event.preventDefault();

            const name = document.getElementById('productName').value.trim();
            const price = parseInt(document.getElementById('productPrice').value);
            const desc = document.getElementById('productDesc').value.trim();

            if (isUnlimited) stock = "";

            // 留ㅼ튂 ??諛??좎쭨 ?뺤쓽
            const catVal = document.getElementById('categoryValue').value;
            let matchKey = catVal;
            let date = "";
            if (currentTab === 'reserve') {
                matchKey = catVal; // ?좎쭨 臾몄옄??(YYYY-MM-DD)
                date = catVal;      // ?좎쭨 臾몄옄??(YYYY-MM-DD)
            }

            if (!name) {
                showToast("?곹뭹紐낆쓣 ?낅젰?댁＜?몄슂.");
                return;
            }

            try {
                const finalImages = [];
                
                // 1. ?쒖감?곸쑝濡??덈줈???ъ쭊 ?뚯씪?ㅼ쓣 Google Drive???낅줈??                for (let i = 0; i < selectedFiles.length; i++) {
                    const item = selectedFiles[i];
                    if (item.isExisting) {

                    }
                    
                    showLoader(`?벝 ?ъ쭊 ?낅줈??以?(${i + 1}/${selectedFiles.length}): ${item.displayName}`);
                    const base64Data = await getCompressedBase64(item.file);
                    
                    const payload = {
                        header: "upload_image",
                        productName: name,

                    };

                    const response = await fetch(API_URL, {

                            'Content-Type': 'text/plain'
                        },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) throw new Error(`[${item.displayName}] ?대?吏 ?낅줈???ㅽ뙣`);
                    const resJson = await response.json();
                    
                    if (resJson.result === 'success') {
                        // ?????fileId, id, fileid) ?숈떆 留ㅽ븨 吏?먯쑝濡??명솚??100% 蹂댁옣
                        item.id = resJson.fileId || resJson.id || resJson.fileid || null;
                    } else {
                        throw new Error(resJson.message || "?대?吏 ?쒕쾭 ?묐떟 ?먮윭");
                    }
                }

                // 2. ?щ꽕??????대?吏)濡?吏?뺣맂 ID媛 諛곗뿴??0踰덉㎏ ?몃뜳?ㅼ뿉 ?ㅻ룄濡??뺣젹?섏뿬 理쒖쥌 諛곗뿴 援ъ꽦
                if (thumbnailIndex >= 0 && thumbnailIndex < selectedFiles.length) {
                    const thumb = selectedFiles[thumbnailIndex];

                }
                selectedFiles.forEach((item, idx) => {

                });

                // Firebase ?곗씠??諛고룷
                showLoader("?뮶 Firebase 二쇰Ц???곗씠?곕쿋?댁뒪 諛섏쁺 以?..");

                const productObj = {
                    name: name,

                };

                let updatedProducts = [...products];

                if (isEditMode && editProductKey !== null) {
                    // ?섏젙 紐⑤뱶: 湲곗〈 ??ぉ ?낅뜲?댄듃
                    updatedProducts[editProductKey] = productObj;
                } else {
                    // ?깅줉 紐⑤뱶: 湲곗〈 紐⑸줉???숈씪???대쫫&?좎쭨媛 ?덈뒗吏 以묐났 寃??                    const dupIndex = updatedProducts.findIndex(p => p.name === name && p.date === date);
                    if (dupIndex > -1) {
                        if (!confirm("?숈씪???좎쭨??媛숈? ?대쫫???곹뭹???대? ?깅줉?섏뼱 ?덉뒿?덈떎.\n??뼱?곗떆寃좎뒿?덇퉴?")) {

                await new Promise(r => setTimeout(r, 1500)); // ?좎뒪?몃? ?덉쑝濡??쎌쓣 ???덇쾶 ?좎떆 吏??
                // Firebase PUT ?꾩넚
                const writeRes = await fetch(`${FIREBASE_DB_URL}published_products.json`, {

                if (!writeRes.ok) throw new Error("Firebase 諛고룷 ?ㅽ뙣");

                showToast(isEditMode ? "?곹뭹 ?섏젙???꾨즺?섏뿀?듬땲??" : "?덈줈???곹뭹???깃났?곸쑝濡??깅줉?섏뿀?듬땲??");
                
                // ?곹깭 由ъ뀑 諛????대룞
                exitEditMode();

            } catch (e) {
                console.error("?쒖텧 ?먮윭:", e);
                showToast("?낅줈??以??먮윭媛 諛쒖깮?덉뒿?덈떎: " + e.toString());
            } finally {

            }
        }

        // ?뚯씪??由ъ궗?댁쭠 諛?JPEG ?뺤텞?섏뿬 媛踰쇱슫 base64 ?щ㎎?쇰줈 蹂寃쏀븯??理쒖쟻???ы띁 ?⑥닔
        function getCompressedBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        try {
                            const canvas = document.createElement('canvas');
                            const maxDimension = 1024; // 理쒕? 媛濡쒖꽭濡??댁긽??1024px ?쒗븳
                            let width = img.width;
                            let height = img.height;

                            if (width > maxDimension || height > maxDimension) {
                                if (width > height) {
                                    height = Math.round((height * maxDimension) / width);
                                    width = maxDimension;
                                } else {
                                    width = Math.round((width * maxDimension) / height);
                                    height = maxDimension;
                                }
                            }

                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);

                            // JPEG ?щ㎎?쇰줈 ?뺤텞 ?덉쭏 70% ?ㅼ젙 ?곸슜
                            const compressedBase64 = canvas.toDataURL("image/jpeg", 0.7);
                            resolve(compressedBase64);
                        } catch (err) {
                            reject(err);
                        }
                    };
                    img.onerror = (err) => reject(err);
                };
                reader.onerror = (err) => reject(err);
            });
        }
